<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://kit.fontawesome.com/0a99374ff4.js" crossorigin="anonymous"></script>
  <title>Selecionar Categorias</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #0b0b0b;
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 460px;
      margin-top: 20px;
    }

    /* Barra de progresso */
    .progresso-wrapper {
      margin-bottom: 20px;
    }

    .progresso-topo {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .progresso-label {
      font-size: 13px;
      color: #888;
    }

    .progresso-passo {
      font-size: 13px;
      color: #1fa38a;
      font-weight: 600;
    }

    .barra-progresso {
      height: 5px;
      background: #222;
      border-radius: 10px;
      overflow: hidden;
    }

    .barra-progresso-fill {
      height: 100%;
      width: 33%;
      background: #1fa38a;
      border-radius: 10px;
      transition: width 0.4s ease;
    }

    /* Botão voltar */
    .botao-voltar {
      background: none;
      border: none;
      color: #1fa38a;
      font-size: 15px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 16px;
      padding: 0;
      font-weight: 600;
    }

    .cartao {
      background: #141414;
      padding: 28px;
      border-radius: 24px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }

    .cabecalho-cartao {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 22px;
      font-weight: 700;
    }

    .contador-badge {
      background: #1fa38a;
      color: white;
      font-size: 13px;
      font-weight: 700;
      padding: 4px 12px;
      border-radius: 20px;
      min-width: 28px;
      text-align: center;
      display: none;
    }

    .contador-badge.visivel {
      display: block;
    }

    .subtitulo {
      font-size: 14px;
      color: #888;
      margin-bottom: 20px;
    }

    /* Grid de categorias */
    .grid-categorias {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }

    .item-categoria {
      background: #1c1c1c;
      border: 2px solid transparent;
      border-radius: 14px;
      padding: 14px 12px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-align: center;
      position: relative;
    }

    .item-categoria:hover {
      background: #242424;
      border-color: #1fa38a44;
    }

    .item-categoria.selecionado {
      background: #0f3d30;
      border-color: #1fa38a;
    }

    .item-categoria.selecionado .nome-categoria {
      color: #1fa38a;
    }

    .icone-categoria {
      font-size: 26px;
    }

    .nome-categoria {
      font-size: 13px;
      font-weight: 600;
      color: #ccc;
      line-height: 1.3;
    }

    .check-categoria {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid #444;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      transition: all 0.2s;
    }

    .item-categoria.selecionado .check-categoria {
      background: #1fa38a;
      border-color: #1fa38a;
      color: white;
    }

    /* Input de categoria oculto */
    .item-categoria input[type="checkbox"] {
      display: none;
    }

    .aviso-minimo {
      background: #2a1a1a;
      border: 1px solid #c0392b44;
      color: #e74c3c;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 10px;
      margin-bottom: 14px;
      display: none;
    }

    .botao-continuar {
      display: block;
      width: 100%;
      padding: 16px;
      border-radius: 30px;
      text-align: center;
      font-weight: 700;
      font-size: 16px;
      background: #1fa38a;
      color: white;
      border: none;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .botao-continuar:hover { background: #17806c; transform: translateY(-1px); }
    .botao-continuar:active { transform: translateY(0); }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      color: white;
      padding: 14px 24px;
      border-radius: 30px;
      font-size: 15px;
      font-weight: 600;
      box-shadow: 0 6px 20px rgba(0,0,0,0.4);
      transition: transform 0.4s ease;
      z-index: 9999;
      white-space: nowrap;
    }
    .toast.visivel { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>
  <div class="container">
    <!-- Barra de progresso -->
    <div class="progresso-wrapper">
      <div class="progresso-topo">
        <span class="progresso-label">Nova Denúncia</span>
        <span class="progresso-passo">Passo 1 de 3</span>
      </div>
      <div class="barra-progresso">
        <div class="barra-progresso-fill"></div>
      </div>
    </div>

    <button onclick="history.back()" class="botao-voltar">← Voltar</button>

    <div class="cartao">
      <div class="cabecalho-cartao">
        <h2>Categorias</h2>
        <div class="contador-badge" id="contador-badge">0</div>
      </div>
      <p class="subtitulo">Selecione uma ou mais categorias para a sua denúncia</p>

      <div class="aviso-minimo" id="aviso-minimo">
        <i class="fa-solid fa-triangle-exclamation"></i> Por favor, selecione pelo menos uma categoria.
      </div>

      <div class="grid-categorias" id="grid-categorias">
        <!-- Preenchido pelo JS -->
      </div>

      <button onclick="continuarParaFormulario()" class="botao-continuar">Continuar →</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const categorias = [
      { nome: "Lixo e Ambiente",      icone: "🗑️" },
      { nome: "Iluminação Pública",   icone: "💡" },
      { nome: "Violência",            icone: "🚨" },
      { nome: "Segurança",            icone: "🔐" },
      { nome: "Corrupção",            icone: "⚖️" },
      { nome: "Serviços Públicos",    icone: "🏛️" },
      { nome: "Saúde e Higiene",      icone: "🏥" },
      { nome: "Riscos e Incêndios",   icone: "🔥" },
      { nome: "Trânsito",             icone: "🚦" },
      { nome: "Animais",              icone: "🐾" },
      { nome: "Barulho",              icone: "🔊" },
      { nome: "Outro",                icone: "📋" }
    ];

    function renderCategorias() {
      const grid = document.getElementById('grid-categorias');
      grid.innerHTML = categorias.map(cat => `
        <label class="item-categoria" id="cat-${cat.nome.replace(/\s/g, '_')}" onclick="toggleCategoria(this)">
          <input type="checkbox" value="${cat.nome}">
          <div class="check-categoria">✓</div>
          <span class="icone-categoria">${cat.icone}</span>
          <span class="nome-categoria">${cat.nome}</span>
        </label>
      `).join('');
    }

    function toggleCategoria(label) {
      const cb = label.querySelector('input[type="checkbox"]');
      cb.checked = !cb.checked;
      label.classList.toggle('selecionado', cb.checked);
      atualizarContador();
    }

    function atualizarContador() {
      const total = document.querySelectorAll('#grid-categorias input:checked').length;
      const badge = document.getElementById('contador-badge');
      badge.textContent = total + (total === 1 ? ' selecionada' : ' selecionadas');
      badge.classList.toggle('visivel', total > 0);
    }

    function continuarParaFormulario() {
      const checkboxes = document.querySelectorAll('#grid-categorias input:checked');
      const selecionadas = Array.from(checkboxes).map(cb => cb.value);

      if (selecionadas.length === 0) {
        document.getElementById('aviso-minimo').style.display = 'block';
        return;
      }

      document.getElementById('aviso-minimo').style.display = 'none';
      localStorage.setItem('categoriasSelecionadas', JSON.stringify(selecionadas));
      window.location.href = "Tela3_formulario.html";
    }

    function mostrarToast(msg, tipo) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.background = tipo === 'erro' ? '#c0392b' : '#1fa38a';
      t.classList.add('visivel');
      setTimeout(() => t.classList.remove('visivel'), 3000);
    }

    renderCategorias();
  </script>
</body>
</html>
